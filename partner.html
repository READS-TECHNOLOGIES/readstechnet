<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Partnerships | $READS</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet"/>
  <link rel="icon" href="assets/reads-logo.png"/>
  </head>
<body>
  <reads-nav></reads-nav>
  

  
  

  <main class="content-page">
    <h1 data-aos="fade-up">Become a <span class="highlight">Partner</span></h1>
    <section class="partners-intro-section">
      <p data-aos="fade-up" data-aos-delay="100">
        $READS is building a robust ecosystem to empower students and educators. We are actively seeking partnerships with schools, universities, content creators, and exam boards. Join us in our mission to make quality education profitable and accessible.
      </p>
    </section>

    <section class="partner-form-section">
        <h2 data-aos="fade-right">Partnership Application Form</h2>
        <form action="https://formspree.io/f/mblkyqyr" method="POST" class="partner-form" data-aos="fade-up" data-aos-delay="100">
            <div class="form-group">
                <label for="organizationName">Organization/Company Name:</label>
                <input type="text" id="organizationName" name="organizationName" required>
            </div>
            <div class="form-group">
                <label for="contactPerson">Contact Person's Name:</label>
                <input type="text" id="contactPerson" name="contactPerson" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="partnershipType">Type of Partnership:</label>
                <select id="partnershipType" name="partnershipType" required>
                    <option value="">-- Select --</option>
                    <option value="school">School/University</option>
                    <option value="contentCreator">Content Creator</option>
                    <option value="examBoard">Exam Board</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">How can we partner with you?</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="btn primary-btn">Submit Application</button>
        </form>
    </section>
  </main>

 
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 800,
      once: true, // Animations only once
      mirror: false, // Animations repeat on scroll up
    });
  </script>

  

<script src="js/components.js"></script>
  
  <script src="js/components.js" defer></script>
  <reads-footer></reads-footer>
</body>
</html>
